# Default values for vibeready distributed deployment.

image:
  repository: vibeready
  tag: latest
  pullPolicy: IfNotPresent

master:
  replicas: 1
  dashboardPort: 7070
  maxConcurrentJobs: 10
  # IMPORTANT: Set a shared secret for production use. Protects master API
  # write endpoints (Bearer token) and master→worker HMAC signing.
  authSecret: ""
  persistent: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

worker:
  replicas: 3
  capacity: 3
  # Must match master.authSecret.
  authSecret: ""
  resources:
    requests:
      cpu: 200m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

config:
  targetURL: "http://inference-service:8080/infer"
  method: "POST"
  body: '{"prompt":"hello"}'
  concurrency: 20
  duration: "30s"
  timeout: "5s"

service:
  type: ClusterIP
  dashboardPort: 7070
  workerPort: 8081
