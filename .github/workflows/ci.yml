name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.25']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Format check
      run: |
        fmt=$(gofmt -l .)
        if [ -n "$fmt" ]; then
          echo "Files not gofmt'd:"
          echo "$fmt"
          exit 1
        fi

    - name: Build
      run: go build ./...

    - name: Test
      run: go test -count=1 -timeout 60s ./...

    - name: Vet
      run: go vet ./...

    - name: Race
      run: go test -race -count=1 -timeout 120s ./...

    - name: Docker build
      run: docker build -t vibeready .

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.17.0

    - name: Helm lint
      run: helm lint ./deploy/helm/vibeready

    - name: Helm template
      run: helm template vibeready ./deploy/helm/vibeready
