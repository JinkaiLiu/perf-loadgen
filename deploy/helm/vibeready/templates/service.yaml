apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-master
  labels:
    app: vibeready
    component: master
spec:
  type: {{ .Values.service.type }}
  selector:
    app: vibeready
    component: master
  ports:
  - port: {{ .Values.service.dashboardPort }}
    targetPort: dashboard
    name: dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: vibeready
    component: worker
spec:
  clusterIP: None
  selector:
    app: vibeready
    component: worker
  ports:
  - port: {{ .Values.service.workerPort }}
    targetPort: worker
    name: worker
